# Deck (极简演示) 生产环境 Nginx 配置
# 该配置已针对 Vue 3 (History 模式) 与演示文稿的高性能加载进行优化

server {
    listen 80;
    server_name jiansi.xyz; # 已为您配置的域名

    # 部署目录，需与 deploy.sh 中的 SERVER_PATH 保持一致
    root /var/www/deck;
    index index.html;

    # 开启 Gzip 压缩，显著减少静态资源传输大小
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary on;

    # 核心：处理子路径 /deck/ 下的 Vue Router History 模式
    location /deck/ {
        alias /var/www/deck/; # 使用 alias 映射子路径到目录
        index index.html;
        try_files $uri $uri/ /deck/index.html;
    }

    # 静态资源缓存策略：注意子路径匹配
    location ~* ^/deck/.*\.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|otf|ttf|svg|mp4|webm|ogg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # 禁止访问敏感文件 (如 .git, .env)
    location ~ /\. {
        deny all;
    }

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # 错误页面处理
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
