# Vue PPT 生产环境 Nginx 配置
# 该配置已针对 Vue 3 (History 模式) 与演示文稿的高性能加载进行优化

server {
    listen 80;
    server_name jiansi.xyz; # 已为您配置的域名

    # 部署目录，需与 deploy.sh 中的 SERVER_PATH 保持一致
    root /var/www/vue-ppt;
    index index.html;

    # 开启 Gzip 压缩，显著减少静态资源传输大小
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary on;

    # 核心：处理 Vue Router 的 History 模式
    # 尝试按顺序查找文件、目录，若都不存在则重定向到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存策略：利用演示文稿的不可变哈希文件名
    # 字体、图片、视频、JS/CSS 开启强缓存
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|otf|ttf|svg|mp4|webm|ogg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # 禁止访问敏感文件 (如 .git, .env)
    location ~ /\. {
        deny all;
    }

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # 错误页面处理
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
